<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>divy — story card</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1080px;
      height: 1920px;
      background: #0a0a12;
      font-family: 'VT323', monospace;
      overflow: hidden;
      position: relative;
    }

    /* starfield */
    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 92%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 20% 20%, rgba(180,130,255,0.4) 0%, transparent 100%),
        radial-gradient(2px 2px at 65% 50%, rgba(180,130,255,0.3) 0%, transparent 100%),
        radial-gradient(2px 2px at 80% 75%, rgba(0,255,255,0.3) 0%, transparent 100%);
    }

    /* scanlines overlay */
    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.15) 3px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* rainbow top bar */
    .rainbow-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 8px;
      background: linear-gradient(90deg, #ff6ec7, #a78bfa, #60a5fa, #34d399, #fbbf24, #f87171, #ff6ec7);
      z-index: 20;
    }

    /* main card */
    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      background: rgba(18, 12, 40, 0.92);
      border: 2px solid #6d28d9;
      border-radius: 8px;
      padding: 80px 80px 70px;
      box-shadow:
        0 0 0 1px rgba(109,40,217,0.3),
        0 0 40px rgba(109,40,217,0.3),
        0 0 80px rgba(109,40,217,0.15),
        inset 0 0 60px rgba(109,40,217,0.05);
    }

    /* corner decorations */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: cyan;
      border-style: solid;
    }
    .card::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

    /* header */
    .header {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: #a78bfa;
      letter-spacing: 4px;
      margin-bottom: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #6d28d9, transparent);
    }

    /* photo + info row */
    .profile-row {
      display: flex;
      align-items: flex-start;
      gap: 60px;
      margin-bottom: 60px;
    }

    /* hologram */
    .hologram-wrap {
      perspective: 800px;
      flex-shrink: 0;
    }
    .hologram-inner {
      width: 220px;
      height: 280px;
      position: relative;
      animation: holo-rotate 8s linear infinite;
      transform-style: preserve-3d;
    }
    .hologram-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border: 2px solid cyan;
      border-radius: 4px;
      filter: brightness(0.75) contrast(1.3) saturate(0) sepia(1) hue-rotate(160deg) brightness(1.3);
      display: block;
    }
    .hologram-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,255,255,0.07) 3px,
        rgba(0,255,255,0.07) 6px
      );
      pointer-events: none;
      animation: scanlines-move 1.5s linear infinite;
    }
    .hologram-glow {
      position: absolute;
      inset: -6px;
      box-shadow: 0 0 16px cyan, 0 0 40px rgba(0,255,255,0.4), inset 0 0 16px rgba(0,255,255,0.1);
      border-radius: 6px;
    }
    @keyframes holo-rotate {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }
    @keyframes scanlines-move {
      0%   { background-position: 0 0; }
      100% { background-position: 0 200px; }
    }

    /* info */
    .info { flex: 1; padding-top: 10px; }
    .name {
      font-family: 'Press Start 2P', monospace;
      font-size: 42px;
      color: #e879f9;
      text-shadow: 0 0 20px rgba(232,121,249,0.6);
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .handle {
      font-size: 28px;
      color: #a78bfa;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }
    .tags {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .tag {
      font-size: 26px;
      color: #c4b5fd;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .tag-icon { color: cyan; font-size: 22px; }

    /* divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #6d28d9, cyan, #6d28d9, transparent);
      margin: 50px 0;
    }

    /* stat row */
    .stats {
      display: flex;
      justify-content: space-around;
      margin-bottom: 55px;
    }
    .stat {
      text-align: center;
    }
    .stat-val {
      font-family: 'Press Start 2P', monospace;
      font-size: 28px;
      color: cyan;
      text-shadow: 0 0 12px cyan;
      display: block;
      margin-bottom: 10px;
    }
    .stat-label {
      font-size: 22px;
      color: #6b7280;
      letter-spacing: 2px;
    }

    /* bio */
    .bio {
      font-size: 28px;
      color: #9ca3af;
      line-height: 1.6;
      text-align: center;
      margin-bottom: 55px;
      font-style: italic;
    }

    /* url */
    .url-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .url-label { font-size: 22px; color: #6b7280; letter-spacing: 3px; }
    .url {
      font-family: 'Press Start 2P', monospace;
      font-size: 20px;
      color: #e879f9;
      text-shadow: 0 0 12px rgba(232,121,249,0.7);
      letter-spacing: 1px;
    }

    /* footer */
    .footer {
      position: absolute;
      bottom: 50px;
      left: 0; right: 0;
      text-align: center;
      font-size: 20px;
      color: #374151;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="scanlines"></div>
  <div class="rainbow-bar"></div>

  <div class="card">
    <!-- corner extra -->
    <div style="position:absolute;top:12px;right:12px;width:24px;height:24px;border-top:2px solid cyan;border-right:2px solid cyan;"></div>
    <div style="position:absolute;bottom:12px;left:12px;width:24px;height:24px;border-bottom:2px solid cyan;border-left:2px solid cyan;"></div>

    <div class="header">★ PLAYER CARD</div>

    <div class="profile-row">
      <div class="hologram-wrap">
        <div class="hologram-inner">
          <img src="/g2-front-divy_1.jpg" alt="divy" />
          <div class="hologram-glow"></div>
        </div>
      </div>
      <div class="info">
        <div class="name">divy</div>
        <div class="handle">@dvyrj08</div>
        <div class="tags">
          <div class="tag"><span class="tag-icon">📍</span> toronto, canada</div>
          <div class="tag"><span class="tag-icon">💻</span> programmer</div>
          <div class="tag"><span class="tag-icon">🎂</span> age: 24</div>
          <div class="tag"><span class="tag-icon">🟢</span> online</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat">
        <span class="stat-val">24/7</span>
        <span class="stat-label">GRINDING</span>
      </div>
      <div class="stat">
        <span class="stat-val">∞</span>
        <span class="stat-label">BUGS FIXED</span>
      </div>
      <div class="stat">
        <span class="stat-val">YYZ</span>
        <span class="stat-label">LOCATION</span>
      </div>
    </div>

    <div class="bio">"writing code and thinking too much about everything else."</div>

    <div class="url-row">
      <span class="url-label">VISIT →</span>
      <span class="url">divyv.vercel.app</span>
    </div>
  </div>

  <div class="footer">★ &nbsp; divy's corner of the internet &nbsp; ★</div>
</body>
</html>
